server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # Static files with long cache for hashed assets
    location /assets/ {
        alias /var/www/match-trading/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Static images and icons
    location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
        root /var/www/match-trading;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Root serves index.html (SPA routing)
    location / {
        root /var/www/match-trading;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # WebSocket proxy to Market Gateway
    location /ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Order API proxy
    location /order {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin API proxy
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8082/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
