name: 'aeron'
services:
  node0:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match0
    shm_size: '1gb'
    privileged: true
    ports:
      - "9002:9002/udp"  # Client ingress port
      - "9003:9003/udp"  # Member facing port
      - "9004:9004/udp"  # Log port
      - "9005:9005/udp"  # Transfer port
      - "9001:9001/udp"  # Archive control port
    networks:
      internal_bus:
        ipv4_address: 172.16.202.2
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_NODE=0
      - CLUSTER_PORT_BASE=9000
      - HEAP_SIZE=1g
  node1:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match1
    shm_size: '1gb'
    privileged: true
    ports:
      - "9102:9102/udp"  # Client ingress port
      - "9103:9103/udp"  # Member facing port
      - "9104:9104/udp"  # Log port
      - "9105:9105/udp"  # Transfer port
      - "9101:9101/udp"  # Archive control port
    networks:
      internal_bus:
        ipv4_address: 172.16.202.3
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - CLUSTER_NODE=1
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_PORT_BASE=9000
      - HEAP_SIZE=1g
  node2:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match2
    shm_size: '1gb'
    privileged: true
    ports:
      - "9202:9202/udp"  # Client ingress port
      - "9203:9203/udp"  # Member facing port
      - "9204:9204/udp"  # Log port
      - "9205:9205/udp"  # Transfer port
      - "9201:9201/udp"  # Archive control port
    networks:
      internal_bus:
        ipv4_address: 172.16.202.4
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - CLUSTER_NODE=2
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_PORT_BASE=9000
      - HEAP_SIZE=1g

  load-generator:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: load-gen
    shm_size: '1gb'
    privileged: true
    networks:
      internal_bus:
        ipv4_address: 172.16.202.10
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
    depends_on:
      - node0
      - node1
      - node2

  backup:
    build:
      context: ../match
      dockerfile: backup.Dockerfile
    hostname: backup
    shm_size: '1gb'
    networks:
      internal_bus:
        ipv4_address: 172.16.202.20
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - BACKUP_HOST=172.16.202.20
      - CLUSTER_PORT_BASE=9000
      - BACKUP_INTERVAL_SEC=60
      - BASE_DIR=/home/aeron/jar/backup
      - HEAP_SIZE=512m
    depends_on:
      - node0
      - node1
      - node2

networks:
  internal_bus:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: 'true'
      com.docker.network.driver.mtu: 9000
      com.docker.network.enable_ipv6: 'false'
    ipam:
      driver: default
      config:
        - subnet: "172.16.202.0/24"
