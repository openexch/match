name: 'aeron'
services:
  node0:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match0
    shm_size: '1gb'
    networks:
      internal_bus:
        ipv4_address: 172.16.202.2
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_NODE=0
      - CLUSTER_PORT_BASE=9000
  node1:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match1
    shm_size: '1gb'
    networks:
      internal_bus:
        ipv4_address: 172.16.202.3
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - CLUSTER_NODE=1
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_PORT_BASE=9000
  node2:
    build:
      context: ../match
      dockerfile: cluster.Dockerfile
    hostname: match2
    shm_size: '1gb'
    networks:
      internal_bus:
        ipv4_address: 172.16.202.4
    environment:
      - CLUSTER_ADDRESSES=172.16.202.2,172.16.202.3,172.16.202.4
      - CLUSTER_NODE=2
      - BASE_DIR=/home/aeron/jar/aeron-cluster
      - CLUSTER_PORT_BASE=9000
  client:
    build:
      context: ../match
      dockerfile: client.Dockerfile
    depends_on:
      - node0
    hostname: admin1
    shm_size: '500mb'
    stdin_open: true
    tty: true
    ports:
      - "80:8080"
    networks:
      internal_bus:
        ipv4_address: 172.16.202.10
networks:
  internal_bus:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: 'true'
      com.docker.network.driver.mtu: 9000
      com.docker.network.enable_ipv6: 'false'
    ipam:
      driver: default
      config:
        - subnet: "172.16.202.0/24"
