name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Market-data persistence integration tests (TimescaleIntegrationTest) run
    # against this service; without MARKET_PG_TEST_URL they self-skip (Assume).
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: marketdata
          POSTGRES_USER: market
          POSTGRES_PASSWORD: ci
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U market -d marketdata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MARKET_PG_TEST_URL: jdbc:postgresql://localhost:5432/marketdata?user=market&password=ci
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

  # Dependency CVEs + committed secrets (match#32 / P1.5). Trivy covers both on a
  # private repo without GitHub Advanced Security; triaged findings go in .trivyignore.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Trivy scan (dependencies + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
