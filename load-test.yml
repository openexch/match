config:
  target: 'http://localhost:80'
  phases:
    - duration: 20
      arrivalRate: 4000
      name: "Peak load"
  processor: "./scripts/generate-order.js"

scenarios:
  - name: "Create Order"
    weight: 100
    flow:
      - function: "generateOrderData"
      - post:
          url: "/order"
          headers:
            Content-Type: "application/json"
          json:
            userId: "{{ userId }}"
            market: "{{ market }}"
            orderType: "{{ orderType }}"
            orderSide: "{{ orderSide }}"
            price: "{{ price }}"
            quantity: "{{ quantity }}"
            totalPrice: "{{ totalPrice }}"
          expect:
            - statusCode: 202