# Aeron media driver configuration for the standalone (EXTERNAL mode) driver.
#
# This is the external counterpart of the embedded tuning in
# match-cluster/.../persistence/AeronCluster.java (launchWithEmbeddedDriver) and
# ClusterConfig.java (mediaDriverContext): keep the values in sync when changing either.
#
# Shared by BOTH the C driver (aeronmd) and the Java driver (io.aeron.driver.MediaDriver):
# size (16m) and duration (100us, 10s) literals parse identically in both.
#
# Deliberately NOT in this file (injected by launch-driver.sh):
#   - aeron.dir                  (per instance: node0/node1/node2/bench-*)
#   - aeron.threading.mode       (per profile: DEDICATED in prod, SHARED in dev)
#   - idle strategies            (value syntax differs: Java takes class names,
#                                 the C driver takes short tokens like "noop"/"backoff")
#   - CPU affinity               (C driver properties / taskset for the Java driver)

# --- Directory lifecycle: the driver process OWNS aeron.dir; clients must never delete it
aeron.dir.delete.on.start=true
aeron.dir.delete.on.shutdown=true

# --- Memory: pre-touch term buffers for consistent latency (no page faults on the hot path)
aeron.term.buffer.sparse.file=false

# --- Term buffers sized for market-data bursts (matches embedded config: 16MB)
aeron.term.buffer.length=16m
aeron.ipc.term.buffer.length=16m

# --- MTU: 8192 requires loopback or jumbo frames end-to-end (see warning in AeronCluster.java)
aeron.mtu.length=8192

# --- Socket buffers: 4MB for burst absorption (requires net.core.rmem_max/wmem_max >= 4MB,
#     see deploy/tuning/system-tuning.sh)
aeron.socket.so_sndbuf=4m
aeron.socket.so_rcvbuf=4m
aeron.rcv.initial.window.length=4m

# --- Timing (unblock timeout must be > client liveness timeout; 5s/10s matches embedded)
aeron.timer.interval=500us
aeron.client.liveness.timeout=5s
aeron.publication.unblock.timeout=10s
aeron.untethered.window.limit.timeout=100ms
aeron.untethered.resting.timeout=100ms

# --- Loss/NAK handling (unicast cluster traffic)
aeron.nak.unicast.delay=100us
aeron.nak.multicast.max.backoff=1ms
aeron.retransmit.unicast.delay=100us
