# Starter Prometheus alert rules for Open Exchange (match#33).
groups:
  - name: openexchange
    rules:
      - alert: NoClusterLeader
        expr: max(match_cluster_role) < 2
        for: 30s
        labels: {severity: critical}
        annotations:
          summary: "No cluster node reports LEADER for 30s (election stuck or quorum lost)"

      - alert: SnapshotAgeHigh
        # Auto-snapshot interval is 5m on the dev box; alert at >2x interval.
        # Only the leader takes snapshots, so look at the leader's age.
        expr: min(match_snapshot_age_seconds{} and on(instance) (match_cluster_role == 2)) > 600
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "Leader has not taken a cluster snapshot in >10m (2x interval)"

      - alert: OmsEgressDrops
        expr: increase(match_dropped_oms_egress_total[5m]) > 0
        labels: {severity: critical}
        annotations:
          summary: "Reliable OMS egress dropped messages — settlement stream integrity at risk (bug9 class)"

      - alert: OmsEgressGaps
        expr: increase(oms_egress_status_gaps_total[5m]) > 0 or increase(oms_egress_trade_gaps_total[5m]) > 0
        labels: {severity: warning}
        annotations:
          summary: "OMS detected statusSeq/tradeId gaps on the egress wire (resnapshot repair engaged)"

      - alert: RiskRejectSpike
        expr: sum(rate(oms_orders_total{result="rejected"}[5m])) > 10
        for: 2m
        labels: {severity: warning}
        annotations:
          summary: "Order reject rate >10/s for 2m — risk config, collar, or slot-cap issue"

      - alert: OmsClusterDisconnected
        expr: oms_cluster_connected == 0
        for: 30s
        labels: {severity: critical}
        annotations:
          summary: "OMS lost its cluster egress session for 30s"

      # Admin-gateway metrics (admin-gateway#12). Alert on fresh, never on
      # running: a running backup process proves nothing (match#36 — the
      # agent wedged silently for days while looking healthy).
      - alert: BackupNotFresh
        expr: admin_backup_fresh == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "Disk backup is not tracking the cluster (heartbeat stale or not OK) — RPO growing"

      - alert: NodeUnhealthy
        expr: admin_cluster_all_nodes_healthy == 0
        for: 2m
        labels: {severity: warning}
        annotations:
          summary: "A cluster node is not HEALTHY for 2m — snapshot/housekeeping guard is engaged; investigate before it strands"

      - alert: ManagedProcessFailed
        expr: admin_process_failed > 0
        labels: {severity: critical}
        annotations:
          summary: "A managed process hit the crash-loop cap or a start error (see lastError in /api/admin/processes)"

      - alert: AdminGatewayDown
        expr: up{job="admin-gateway"} == 0
        for: 1m
        labels: {severity: warning}
        annotations:
          summary: "Admin gateway is not scrapable — process management and backup monitoring are blind"

      # The public demo's outage alert: admin_demo_healthy is derived from the
      # market simulator's end-to-end canary (order round-trip, fills, market
      # data, CORS incl. the public edge) — sim-down also flips it, so no
      # separate up{job="market-sim"} rule is needed.
      - alert: DemoUnhealthy
        expr: admin_demo_healthy == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "Demo canary failing for 2m — sim down or the order/fill/market-data/CORS path is broken (the public demo is broken)"
